name: Site checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the triggering ref without an external action
        env:
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref }}
          EXPECTED_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          umask 077
          git init .
          git remote add origin "${SERVER_URL}/${REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${REF}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Check static site files
        run: python3 -I scripts/check_site.py
