name: Site checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the triggering ref without an external action
        env:
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          git init .
          git remote add origin "${SERVER_URL}/${REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${REF}"
          git checkout --detach FETCH_HEAD

      - name: Check static site files
        run: python3 scripts/check_site.py
