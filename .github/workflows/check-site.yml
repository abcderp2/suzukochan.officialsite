name: Site checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the triggering ref without an external action
        env:
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref }}
          EXPECTED_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          umask 077
          git init .
          git remote add origin "${SERVER_URL}/${REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${REF}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Check static site files
        run: |
          log_file="${RUNNER_TEMP}/site-check.log"
          status=0
          python3 -I scripts/check_site.py >"${log_file}" 2>&1 || status=$?

          escape_command() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            printf '%s' "${value}"
          }

          while IFS= read -r line; do
            case "${line}" in
              ERROR:\ *)
                message="${line#ERROR: }"
                printf '::error title=Site checks::%s\n' "$(escape_command "${message}")"
                ;;
              WARNING:\ *)
                message="${line#WARNING: }"
                printf '::warning title=Site checks::%s\n' "$(escape_command "${message}")"
                ;;
            esac
          done <"${log_file}"

          if [ "${status}" -eq 0 ]; then
            result="Passed"
          else
            result="Failed"
          fi

          {
            echo "## Site checks"
            echo
            echo "- Result: **${result}**"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Command: \`python3 -I scripts/check_site.py\`"
            echo
            echo "### Output"
            sed 's/^/    /' "${log_file}"
          } >>"${GITHUB_STEP_SUMMARY}"

          cat "${log_file}"
          exit "${status}"
