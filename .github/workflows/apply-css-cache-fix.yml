name: Apply CSS cache fix

on:
  push:
    branches:
      - work/20260720-1651-css-cache

permissions:
  contents: write

concurrency:
  group: apply-css-cache-fix-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the exact branch commit
        env:
          REPOSITORY: ${{ github.repository }}
          REF: ${{ github.ref }}
          EXPECTED_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          umask 077
          git init .
          git remote add origin "${SERVER_URL}/${REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${REF}"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - name: Apply the bounded text replacements
        run: |
          python3 -I - <<'PY'
          from pathlib import Path

          old = "style.css?v=20260110b"
          new = "style.css?v=20260720a"
          for name in ("index.html", "en.html", "404.html"):
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count == 0 and new in text:
                  continue
              if count != 1:
                  raise SystemExit(f"{name}: expected exactly one old cache key, found {count}")
              path.write_text(text.replace(old, new), encoding="utf-8")

          changelog = Path("CHANGELOG.md")
          text = changelog.read_text(encoding="utf-8")
          entry = (
              "2026-07-20 | 7月18日のCSS変更後も古いキャッシュ識別子が残っていたため、"
              "全HTMLのスタイルシート参照を同じ識別子へ更新 | "
              "index.html, en.html, 404.html, CHANGELOG.md | SquashコミットをRevert\n"
          )
          if entry not in text:
              marker = "`YYYY-MM-DD | 変更理由 | 対象ファイル | 戻す単位`\n\n"
              if text.count(marker) != 1:
                  raise SystemExit("CHANGELOG.md: insertion marker is not unique")
              changelog.write_text(text.replace(marker, marker + entry, 1), encoding="utf-8")
          PY

      - name: Validate the resulting repository
        run: |
          workflow=.github/workflows/apply-css-cache-fix.yml
          temporary="${RUNNER_TEMP}/apply-css-cache-fix.yml"
          mv "${workflow}" "${temporary}"
          trap 'mv "${temporary}" "${workflow}"' EXIT
          python3 -I scripts/check_site.py
          git diff --check

      - name: Commit and push only the intended files
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: work/20260720-1651-css-cache
        run: |
          git add index.html en.html 404.html CHANGELOG.md
          if git diff --cached --quiet; then
            exit 0
          fi
          test "$(git diff --cached --name-only | sort)" = $'404.html\nCHANGELOG.md\nen.html\nindex.html'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "CSSキャッシュ識別子を更新"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"
          git push origin "HEAD:${BRANCH}"
